# Production overlay for docker-compose.yml
# Usage: docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d

services:
  db:
    restart: always
    # In production, you might want to use a managed database instead
    # Remove the ports if you don't need external access
    ports: []
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}

  cache:
    restart: always
    ports: []

  server:
    build:
      target: production
      args:
        NODE_ENV: production
    restart: always
    ports:
      - "${SERVER_PORT:-8080}:8080"
    environment:
      NODE_ENV: production
      DB_HOST: db
      DB_PORT: 5432
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_NAME: ${DB_NAME}
      REDIS_HOST: cache
      REDIS_PORT: 6379
      SERVER_PORT: 8080
      JWT_SECRET: ${JWT_SECRET}
      CORS_ORIGINS: ${CORS_ORIGINS}
    # Remove volume mounts - code is in the container
    volumes: []
    command: sh -c "cd /app/server && pnpm run migrate && pnpm run start"

  web:
    # In production, web is served by server (single service architecture)
    # So we don't need the web service at all
    profiles:
      - donotstart
