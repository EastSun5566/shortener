services:
  db:
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER:-root}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-password}
      POSTGRES_DB: ${DB_NAME:-url_shortener}
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${DB_USER:-root} -d ${DB_NAME:-url_shortener}",
        ]
      interval: 10s
      timeout: 5s
      retries: 5

  cache:
    image: redis:7-alpine
    restart: always
    volumes:
      - cache_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  server:
    build:
      target: production
      context: .
      dockerfile: Dockerfile
      args:
        NODE_ENV: production
    restart: always
    ports:
      - "${SERVER_PORT:-8080}:8080"
    environment:
      NODE_ENV: production
      HOST: "0.0.0.0"
      PORT: 8080
      DATABASE_URL: postgresql://${DB_USER:-root}:${DB_PASSWORD:-password}@db:5432/${DB_NAME:-url_shortener}
      CACHE_HOST: cache
      CACHE_PORT: 6379
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-7d}
      BCRYPT_SALT_ROUNDS: ${BCRYPT_SALT_ROUNDS:-12}
      CORS_ORIGINS: ${CORS_ORIGINS}
    depends_on:
      db:
        condition: service_healthy
      cache:
        condition: service_healthy
    command: sh -c "pnpm --filter server db:migrate && pnpm --filter server start"

volumes:
  db_data:
  cache_data:
