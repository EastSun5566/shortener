services:
  db:
    image: postgres:18-trixie
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER:-root}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-password}
      POSTGRES_DB: ${DB_NAME:-shortener}
    volumes:
      - db_data_v18:/var/lib/postgresql
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${DB_USER:-root} -d ${DB_NAME:-shortener}",
        ]
      interval: 10s
      timeout: 5s
      retries: 5

  cache:
    image: redis:8.8-trixie
    restart: always
    volumes:
      - cache_data_v8:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  server:
    image: ${SHORTENER_IMAGE:-ghcr.io/eastsun5566/shortener:latest}
    restart: always
    ports:
      - "${SERVER_PORT:-8080}:8080"
    environment:
      NODE_ENV: production
      HOST: "0.0.0.0"
      PORT: 8080
      DATABASE_URL: postgresql://${DB_USER:-root}:${DB_PASSWORD:-password}@db:5432/${DB_NAME:-shortener}
      CACHE_HOST: cache
      CACHE_PORT: 6379
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-7d}
      BCRYPT_SALT_ROUNDS: ${BCRYPT_SALT_ROUNDS:-12}
      CORS_ORIGINS: ${CORS_ORIGINS}
    depends_on:
      db:
        condition: service_healthy
      cache:
        condition: service_healthy

volumes:
  db_data_v18:
  cache_data_v8:
