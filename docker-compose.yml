services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${DB_USER:-root}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-password}
      POSTGRES_DB: ${DB_NAME:-url_shortener}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${DB_USER:-root} -d ${DB_NAME:-url_shortener}",
        ]
      interval: 10s
      timeout: 5s
      retries: 5

  cache:
    image: redis:7-alpine
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - cache_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  server:
    build:
      context: .
      dockerfile: Dockerfile
      target: development
      args:
        NODE_ENV: development
    ports:
      - "${SERVER_PORT:-8080}:8080"
    environment:
      NODE_ENV: development
      DB_HOST: db
      DB_PORT: 5432
      DB_USER: ${DB_USER:-root}
      DB_PASSWORD: ${DB_PASSWORD:-password}
      DB_NAME: ${DB_NAME:-url_shortener}
      DATABASE_URL: postgresql://${DB_USER:-root}:${DB_PASSWORD:-password}@db:5432/${DB_NAME:-url_shortener}
      CACHE_HOST: cache
      CACHE_PORT: 6379
      HOST: "0.0.0.0"
      PORT: 8080
      SERVER_PORT: 8080
      JWT_SECRET: ${JWT_SECRET:-your-super-secret-jwt-key-minimum-32-characters-long-change-in-production}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-7d}
      BCRYPT_SALT_ROUNDS: ${BCRYPT_SALT_ROUNDS:-12}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3001,http://localhost:3000}
    volumes:
      # Mount source code for hot reload
      - ./server:/app/server
      - ./pnpm-workspace.yaml:/app/pnpm-workspace.yaml
      - ./package.json:/app/package.json
      # Preserve node_modules as anonymous volume
      - /app/server/node_modules
      - /app/node_modules
    depends_on:
      db:
        condition: service_healthy
      cache:
        condition: service_healthy
    command: sh -c "cd /app/server && pnpm run db:migrate && pnpm run dev:docker"

  web:
    build:
      context: .
      dockerfile: Dockerfile.dev
      args:
        NODE_ENV: development
    ports:
      - "${WEB_PORT:-3001}:3001"
    environment:
      NODE_ENV: development
      VITE_API_URL: ${VITE_API_URL:-http://localhost:8080}
      WEB_PORT: 3001
    volumes:
      # Mount source code for hot reload
      - ./web:/app/web
      - ./pnpm-workspace.yaml:/app/pnpm-workspace.yaml
      - ./package.json:/app/package.json
      # Preserve node_modules as anonymous volume
      - /app/web/node_modules
      - /app/node_modules
    depends_on:
      - server
    command: sh -c "cd /app/web && pnpm run dev"

volumes:
  db_data:
  cache_data:
