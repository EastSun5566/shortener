name: CI

on:
  push:
    branches: [main]
    tags: ["v*.*.*"]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  verify:
    name: Verify
    runs-on: ubuntu-latest
    env:
      SHORTENER_IMAGE: shortener:ci
      DB_USER: root
      DB_PASSWORD: password
      DB_NAME: shortener
      JWT_SECRET: test-jwt-secret-key-for-ci-minimum-32-characters-long
      CORS_ORIGINS: http://127.0.0.1:8080
      SERVER_PORT: 8080
    steps:
      - uses: actions/checkout@v7

      - uses: pnpm/action-setup@v6
        with:
          version: 10.34.5

      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - if: startsWith(github.ref, 'refs/tags/v')
        name: Verify release version
        run: test "v$(node -p "require('./package.json').version")" = "$GITHUB_REF_NAME"

      - run: pnpm check

      - name: Build production image
        run: docker build --tag shortener:ci .

      - name: Build demo image
        run: docker build --target demo --tag shortener-demo:ci .

      - name: Smoke test production image
        run: |
          docker compose -f docker-compose.prod.yml up -d

          for attempt in {1..60}; do
            if curl --fail --silent http://127.0.0.1:8080/health > /dev/null; then
              break
            fi
            if [ "$attempt" = 60 ]; then
              echo "Server did not become healthy"
              exit 1
            fi
            sleep 1
          done

          curl --fail --silent http://127.0.0.1:8080/ | grep --ignore-case '<!doctype html>'
          curl --fail --silent http://127.0.0.1:8080/login | grep --ignore-case '<!doctype html>'
          curl --fail --silent http://127.0.0.1:8080/register | grep --ignore-case '<!doctype html>'

          token=$(curl --fail --silent \
            --header 'content-type: application/json' \
            --data '{"email":"container-smoke@example.com","password":"Password123"}' \
            http://127.0.0.1:8080/register | jq --raw-output '.token')
          test -n "$token"
          test "$token" != "null"

          curl --fail --silent \
            --header 'content-type: application/json' \
            --header "authorization: Bearer $token" \
            --data '{"originalUrl":"https://example.com/container-smoke"}' \
            http://127.0.0.1:8080/links | jq --exit-status '.existed == false'

          container_id=$(docker compose -f docker-compose.prod.yml ps --quiet server)
          test "$(docker inspect --format '{{.Config.User}}' "$container_id")" = "node"
          test "$(docker exec "$container_id" node --version | cut -d. -f1)" = "v24"
          docker exec "$container_id" grep -q 'VERSION_CODENAME=trixie' /etc/os-release

          db_container_id=$(docker compose -f docker-compose.prod.yml ps --quiet db)
          test "$(docker exec "$db_container_id" postgres --version | sed -n 's/^postgres (PostgreSQL) \([0-9]*\).*/\1/p')" = "18"
          test "$(docker inspect --format '{{range .Config.Env}}{{println .}}{{end}}' "$db_container_id" | sed -n 's/^PGDATA=//p')" = "/var/lib/postgresql/18/docker"
          docker exec "$db_container_id" grep -q 'VERSION_CODENAME=trixie' /etc/os-release

          cache_container_id=$(docker compose -f docker-compose.prod.yml ps --quiet cache)
          test "$(docker exec "$cache_container_id" redis-server --version | sed -n 's/.*v=\([0-9]*\.[0-9]*\).*/\1/p')" = "8.8"
          docker exec "$cache_container_id" grep -q 'VERSION_CODENAME=trixie' /etc/os-release

          docker compose -f docker-compose.prod.yml stop --timeout 15 server
          test "$(docker inspect --format '{{.State.ExitCode}}' "$container_id")" = "0"

      - name: Smoke test demo image
        run: bash scripts/smoke-demo.sh shortener-demo:ci

      - if: failure()
        name: Print container logs
        run: docker compose -f docker-compose.prod.yml logs

      - if: always()
        name: Clean up containers
        run: docker compose -f docker-compose.prod.yml down --volumes

  e2e:
    name: E2E Tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:18-trixie
        env:
          POSTGRES_USER: root
          POSTGRES_PASSWORD: password
          POSTGRES_DB: shortener
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:8.8-trixie
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://root:password@localhost:5432/shortener
      REDIS_URL: redis://localhost:6379
      JWT_SECRET: test-jwt-secret-key-for-ci-minimum-32-characters-long
      NODE_ENV: development
      SERVER_PORT: 8080
      WEB_PORT: 3001
      CORS_ORIGINS: http://localhost:3001
    steps:
      - uses: actions/checkout@v7

      - uses: pnpm/action-setup@v6
        with:
          version: 10.34.5

      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Install Playwright browser
        run: pnpm --filter web exec playwright install chromium --with-deps

      - name: Start server
        run: |
          pnpm server:dev > server.log 2>&1 &
          echo $! > server.pid

      - name: Wait for server
        run: |
          for attempt in {1..60}; do
            if curl --fail --silent http://localhost:8080/health > /dev/null; then
              exit 0
            fi
            if [ "$attempt" = 60 ]; then
              cat server.log
              exit 1
            fi
            sleep 1
          done

      - name: Run E2E tests
        env:
          VITE_API_URL: http://localhost:8080
        run: pnpm test:e2e

      - if: always()
        name: Stop server
        run: |
          if [ -f server.pid ]; then
            kill "$(cat server.pid)" || true
          fi

      - if: failure()
        name: Print server log
        run: cat server.log

      - if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: web/playwright-report/
          retention-days: 7

  publish:
    name: Publish GHCR image
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    needs: [verify, e2e]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v7

      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/setup-qemu-action@v4
      - uses: docker/setup-buildx-action@v4

      - id: production-metadata
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/eastsun5566/shortener
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}

      - uses: docker/build-push-action@v7
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.production-metadata.outputs.tags }}
          labels: ${{ steps.production-metadata.outputs.labels }}

      - id: demo-metadata
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/eastsun5566/shortener-demo
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}

      - uses: docker/build-push-action@v7
        with:
          context: .
          target: demo
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.demo-metadata.outputs.tags }}
          labels: ${{ steps.demo-metadata.outputs.labels }}
